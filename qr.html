<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>APK QR</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f5f8fc;
        color: #1e2a3a;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        background: #fff;
        border: 1px solid #e3ecf9;
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }
      .title {
        font-weight: 700;
        font-size: 20px;
        margin-bottom: 10px;
      }
      .url {
        font-size: 12px;
        color: #6b7a90;
        margin-top: 12px;
        word-break: break-all;
      }
      canvas {
        margin: 8px auto 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Scan to Download APK</div>
      <canvas id="qr"></canvas>
      <div class="url" id="url"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
      const url = "https://expo.dev/artifacts/eas/rmTeut2H8M1xA5QJLerecc.apk";
      document.getElementById("url").textContent = url;
      QRCode.toCanvas(document.getElementById("qr"), url, { width: 240, margin: 2 });
    </script>
  </body>
</html>
